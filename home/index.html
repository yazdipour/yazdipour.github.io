<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Links</title>
    <link rel="icon" href="https://api.iconify.design/material-symbols:home.svg?color=%23ff9800" />
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        max-width: 760px;
        margin: 0 auto;
        padding: 40px 20px;
        background: #111111;
        color: #e0e0e0;
        min-height: 100vh;
      }
      h1 {
        color: #ffffff;
      }
      h2 {
        color: #ffffff;
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 20px;
      }
      h3 {
        color: #ffffff;
        font-size: 16px;
        font-weight: 500;
        opacity: 0.9;
      }
      .links {
        list-style: none;
        padding: 0;
      }
      .links li {
        margin: 15px 0;
      }
      .links a {
        display: inline-block;
        padding: 10px 15px;
        background-color: #2d2d2d;
        color: #ffffff;
        text-decoration: none;
        border-radius: 5px;
        transition: background-color 0.3s;
        border: 1px solid #404040;
      }
      .links a:hover {
        background-color: #404040;
      }
      hr {
        border: none;
        height: 1px;
        background: linear-gradient(
          to right,
          transparent,
          rgba(255, 255, 255, 0.1),
          transparent
        );
        margin: 40px 0;
      }
      .todo {
        margin-top: 0;
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
        border-radius: 16px;
        padding: 24px;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .todo h2 {
        margin-top: 0;
      }
      .todo input {
        width: 100%;
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: #ffffff;
        font-size: 14px;
        transition: all 0.3s ease;
      }
      .todo input:focus {
        outline: none;
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(99, 102, 241, 0.5);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
      }
      .todo input::placeholder {
        color: rgba(255, 255, 255, 0.4);
      }
      .todo button {
        padding: 10px 18px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        color: #ffffff;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 13px;
      }
      .todo button:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateY(-1px);
      }
      .todo ul {
        list-style: none;
        padding: 0;
        margin-top: 20px;
      }
      .todo li {
        width: 100%;
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 10px;
        margin: 10px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: all 0.2s ease;
      }
      .todo li:hover {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.1);
      }
      .todo li span {
        animation: flashText 1s ease-in-out infinite;
      }
      @keyframes flashText {
        0%, 100% { color: #ffffff; }
        50% { color: rgba(255, 255, 255, 0.1); }
      }
      .todo li button {
        padding: 4px 10px;
        font-size: 16px;
        background: rgba(239, 68, 68, 0.1);
        border-color: rgba(239, 68, 68, 0.2);
      }
      .todo li button:hover {
        background: rgba(239, 68, 68, 0.2);
        border-color: rgba(239, 68, 68, 0.3);
      }
      .todo li a {
        color: #818cf8;
        text-decoration: none;
        transition: color 0.2s ease;
      }
      .todo li a:hover {
        color: #a5b4fc;
      }
      .bookmarks {
        margin-top: 40px;
      }
      .bookmarks h3 {
        color: #ffffff;
        margin-top: 35px;
        margin-bottom: 16px;
        font-size: 16px;
        font-weight: 500;
        letter-spacing: 0.5px;
      }
      .bookmarks .service-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
        margin-bottom: 20px;
      }
      .bookmarks .service-card {
        display: block;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        text-decoration: none;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
      }
      .bookmarks .service-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(
          135deg,
          rgba(99, 102, 241, 0.05),
          rgba(168, 85, 247, 0.05)
        );
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .bookmarks .service-card:hover::before {
        opacity: 1;
      }
      .bookmarks .service-card:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.15);
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }
      .bookmarks .service-card h4 {
        color: #e0e0e0;
        margin: 0;
        font-size: 14px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 10px;
        position: relative;
        z-index: 1;
      }
      .bookmarks .service-card:hover h4 {
        color: #ffffff;
      }
      .bookmarks .service-card .icon-container {
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        flex-shrink: 0;
        transition: all 0.3s ease;
      }
      .bookmarks .service-card:hover .icon-container {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.2);
        transform: scale(1.1);
      }
      .bookmarks h2 {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .bookmarks h2 span {
        font-size: 13px;
        cursor: pointer;
        user-select: none;
        padding: 6px 14px;
        border-radius: 8px;
        background: rgba(99, 102, 241, 0.15);
        border: 1px solid rgba(99, 102, 241, 0.3);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        font-weight: 500;
        color: #a5b4fc;
      }
      .bookmarks h2 span:hover {
        background: rgba(99, 102, 241, 0.25);
        border-color: rgba(99, 102, 241, 0.4);
        transform: translateY(-1px);
      }
      .bookmarks h2 span.toggled {
        text-decoration: line-through;
        opacity: 0.5;
        background: rgba(239, 68, 68, 0.15);
        border-color: rgba(239, 68, 68, 0.3);
        color: #fca5a5;
      }
      @media (max-width: 640px) {
        .bookmarks .service-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 480px) {
        .bookmarks .service-grid {
          grid-template-columns: 1fr;
        }
      }
      .version {
        text-align: center;
        font-size: 10px;
        opacity: 0.4;
        margin-top: 60px;
        padding-bottom: 20px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }
    </style>
  </head>
  <body>
    <div class="todo">
      <h2>Todo List</h2>
      <input type="text" id="todoInput" placeholder="Add task or link..." />
      <ul id="todoList"></ul>
    </div>

    <hr />

    <div class="bookmarks">
      <h2>
        Bookmarks
        <span id="labToggle" onclick="toggleLab()">✔︎ vpn</span>
      </h2>

      <!-- All bookmark sections will be inserted here dynamically -->
      <div id="allBookmarks"></div>
    </div>

    <script>
      // Bookmark services data with icons
      const bookmarkServices = {
        "Quick Links": [
          {
            name: "Gmail",
            url: "https://mail.google.com/",
            icon: "simple-icons:google",
            color: "#d93025",
          },
          {
            name: "Outlook",
            url: "https://outlook.live.com/mail/",
            icon: "simple-icons:microsoftoutlook",
            color: "#0078d4",
          },
          {
            name: "Notion",
            url: "https://www.notion.so/",
            icon: "simple-icons:notion",
            color: "#ffffff",
          },
          {
            name: "Gemini",
            url: "https://gemini.google.com/",
            icon: "simple-icons:google",
            color: "#4285f4",
          },
          {
            name: "ChatGPT",
            url: "https://chat.openai.com/",
            icon: "simple-icons:openai",
            color: "#10a37f",
          },
          {
            name: "X",
            url: "https://www.x.com/",
            icon: "mdi:twitter",
            color: "#1da1f2",
          },
          {
            name: "Discord",
            url: "https://discord.com/channels/@me",
            icon: "simple-icons:discord",
            color: "#5865f2",
          },
          {
            name: "Reddit",
            url: "https://www.reddit.com/",
            icon: "simple-icons:reddit",
            color: "#ff4500",
          },
        ],
        Media: [
          {
            name: "Youtube",
            url: "https://www.youtube.com/",
            icon: "simple-icons:youtube",
            color: "#ff0000",
          },
          {
            name: "Subs",
            url: "https://www.youtube.com/feed/subscriptions",
            color: "#ff0000",
            icon: "mdi:youtube-subscription",
          },
          {
            name: "Playlist",
            url: "https://www.youtube.com/feed/playlists",
            color: "#ff0000",
            icon: "mdi:playlist-play",
          },
          {
            name: "Music",
            url: "https://music.youtube.com/",
            icon: "mdi:playlist-music",
            color: "#ff0000",
          },
        ],
        Services: [
          {
            name: "Karakeep",
            url: "http://lab:3000/",
            icon: "mdi:bookmark",
            color: "#eee",
          },
          {
            name: "ownCloud",
            url: "http://lab:8888/",
            icon: "simple-icons:owncloud",
            color: "#eee",
          },
          {
            name: "CTRL PANEL",
            url: "http://lab:8787/",
            icon: "mdi:server",
            color: "#eee",
          },
        ],
      };

      // Toggle Lab URLs
      function toggleLab() {
        const toggled = localStorage.getItem("labToggled") === "true";
        localStorage.setItem("labToggled", !toggled);
        updateLabToggleUI();
        loadBookmarks();
      }

      function updateLabToggleUI() {
        const toggled = localStorage.getItem("labToggled") === "true";
        const span = document.getElementById("labToggle");
        if (toggled) {
          span.classList.add("toggled");
        } else {
          span.classList.remove("toggled");
        }
      }

      function getServiceUrl(url) {
        const toggled = localStorage.getItem("labToggled") === "true";
        if (toggled && url.startsWith("http://lab")) {
          return url.replace("http://lab", "http://192.168.0.93");
        }
        return url;
      }

      // Load dynamic bookmarks
      function loadBookmarks() {
        const container = document.getElementById("allBookmarks");
        let html = "";

        for (const [category, services] of Object.entries(bookmarkServices)) {
          html += `<h3>${category}</h3>`;
          html += '<div class="service-grid">';

          services.forEach((service) => {
            const url = getServiceUrl(service.url);
            const icon = service.icon
              ? `<span class="icon-container"><span class="iconify" data-icon="${service.icon}" data-width="16" style="color: ${service.color}"></span></span>`
              : "";
            html += `
                        <a href="${url}" class="service-card" target="_self">
                            <h4>${icon}${service.name}</h4>
                        </a>
                    `;
          });

          html += "</div>";
        }

        container.innerHTML = html;
      }

      // Todo list functionality
      const list = document.getElementById("todoList");
      const input = document.getElementById("todoInput");

      function loadTodos() {
        const todos = JSON.parse(localStorage.getItem("todos") || "[]");
        list.innerHTML = "";
        todos.forEach((todo, i) => {
          const li = document.createElement("li");
          const isLink = /^https?:\/\//i.test(todo);
          const content = document.createElement(isLink ? "a" : "span");
          if (isLink) {
            content.href = todo;
            content.textContent = todo;
            content.rel = "noopener noreferrer";
            content.target = "_blank";
          } else {
            content.textContent = todo;
          }

          const textWrap = document.createElement("span");
          textWrap.appendChild(content);

          const removeButton = document.createElement("button");
          removeButton.type = "button";
          removeButton.textContent = "×";
          removeButton.addEventListener("click", () => removeTodo(i));

          li.appendChild(textWrap);
          li.appendChild(removeButton);
          list.appendChild(li);
        });
      }

      function addTodo() {
        const val = input.value.trim();
        if (!val) return;
        const todos = JSON.parse(localStorage.getItem("todos") || "[]");
        todos.push(val);
        localStorage.setItem("todos", JSON.stringify(todos));
        input.value = "";
        loadTodos();
      }

      function removeTodo(i) {
        const todos = JSON.parse(localStorage.getItem("todos") || "[]");
        todos.splice(i, 1);
        localStorage.setItem("todos", JSON.stringify(todos));
        loadTodos();
      }

      input.addEventListener("keydown", (e) => e.key === "Enter" && addTodo());

      // Initialize
      loadTodos();
      updateLabToggleUI();
      loadBookmarks();
    </script>
    <!-- Update version after modifications: vYYYYMMDD.HHMM -->
    <div class="version">v20260315.1200</div>
  </body>
</html>
